services:
  ubuntu-22.04:
    build:
      context: .
      dockerfile: Dockerfile.ubuntu-22.04
    volumes:
      - ../../dist/build/x86_64-linux-gnu:/artifacts:ro
      - ./scripts:/scripts:ro
      - ./fixtures:/fixtures:ro
      - ./c-test:/c-test:ro
      - ../../bindings:/src/bindings:ro
      - ../../include:/src/include:ro

