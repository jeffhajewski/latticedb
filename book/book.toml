[book]
title = "LatticeDB Documentation"
description = "The embedded knowledge graph for AI"
authors = ["Jeff Hajewski"]
language = "en"
src = "src"

[build]
build-dir = "build"

[output.html]
default-theme = "navy"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/jeffhajewski/latticedb"
git-repository-icon = "fa-github"
edit-url-template = "https://github.com/jeffhajewski/latticedb/edit/main/book/src/{path}"
site-url = "https://docs.latticedb.org/"
no-section-label = false
additional-css = ["custom.css"]

[output.html.search]
enable = true
limit-results = 20
